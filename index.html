<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahjong-inspired Game</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        canvas {
            border: 1px solid black;
            background: white;
        }

        /* Add new timer styles */
        #timer {
            width: 700px;
            height: 10px;
            background: #ddd;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        #timer-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, #ff4444, #4CAF50);
            transition: width 1s linear;
        }

        /* Make score more prominent */
        #score-container {
            font-size: 24px;
            font-weight: bold;
            margin-top: 15px;
        }

        /* Add flash animation */
        @keyframes flash {
            0% { filter: brightness(1); }
            50% { filter: brightness(1.5); }
            100% { filter: brightness(1); }
        }

        .timer-flash {
            animation: flash 0.5s ease-out;
        }
    </style>
</head>
<body>
    <!-- Add timer bar -->
    <div id="timer">
        <div id="timer-bar"></div>
    </div>
    <canvas id="gameCanvas" width="700" height="400"></canvas>
    <div id="score-container">Score: <span id="score">0</span></div>
    <script src="game.js"></script>
</body>
</html>
